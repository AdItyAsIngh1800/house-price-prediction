name: Python CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-check:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Verify Python syntax
        run: |
          python -m py_compile api/main.py
          python -m py_compile api/schemas.py
          python -m py_compile app/streamlit_app.py
          python -m py_compile src/data_preprocessing.py
          python -m py_compile src/train_model.py

      - name: Check imports
        run: |
          python -c "import fastapi, streamlit, pandas, sklearn, joblib, requests, mlflow"
          python -c "from api.main import app"
          python -c "from api.schemas import PredictionRequest, PredictionResponse"

      - name: Verify Dockerfile exists
        run: |
          test -f Dockerfile
          test -f docker-compose.yml