version: "3.9"

services:

  api:
    build: .
    container_name: house_price_api
    ports:
      - "8000:8000"
    volumes:
      - .:/app
    command: uvicorn api.main:app --host 0.0.0.0 --port 8000

  streamlit:
    build: .
    container_name: house_price_streamlit
    ports:
      - "8501:8501"
    volumes:
      - .:/app
    command: streamlit run app/streamlit_app.py --server.port 8501 --server.address 0.0.0.0
    depends_on:
      - api

  mlflow:
    build: .
    container_name: house_price_mlflow
    ports:
      - "5001:5000"
    volumes:
      - .:/app
    command: mlflow server --backend-store-uri sqlite:///mlflow.db --default-artifact-root ./mlruns --host 0.0.0.0 --port 5000