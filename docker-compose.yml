version: "3.9"

services:
  api:
    build: .
    container_name: house_price_api
    command: uvicorn api.main:app --host 0.0.0.0 --port 8000
    ports:
      - "8000:8000"
    volumes:
      - .:/app

  streamlit:
    build: .
    container_name: house_price_streamlit
    command: streamlit run app/streamlit_app.py --server.port 8501 --server.address 0.0.0.0
    ports:
      - "8501:8501"
    volumes:
      - .:/app
    depends_on:
      - api

  mlflow:
    build: .
    container_name: house_price_mlflow
    command: mlflow server --backend-store-uri sqlite:////app/mlflow.db --default-artifact-root /app/mlruns --host 0.0.0.0 --port 5000
    ports:
      - "5001:5000"
    volumes:
      - .:/app